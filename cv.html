<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer votre CV | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0d14;
            --card: #131728;
            --text: #f1f3ff;
            --muted: #9aa4c4;
            --accent: #6c72ff;
            --line: #2a3150;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at 20% 20%, #20284a, var(--bg));
            min-height: 100vh;
        }

        .wrap {
            max-width: 800px;
            margin: 0 auto;
            padding: 24px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            margin: 0;
        }

        .back-link {
            color: var(--text);
            text-decoration: none;
            border: 1px solid var(--line);
            padding: 10px 14px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .panel {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 30px;
        }

        h2 {
            margin-top: 0;
            font-size: 20px;
            margin-bottom: 20px;
            color: var(--accent);
        }

        .field {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--muted);
            font-size: 14px;
            font-weight: 500;
        }

        input,
        textarea {
            width: 100%;
            border: 1px solid var(--line);
            background: #0d1120;
            color: var(--text);
            border-radius: 10px;
            padding: 12px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        textarea {
            min-height: 100px;
            resize: vertical;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-send {
            background: var(--accent);
            color: white;
        }

        .btn-send:hover {
            background: #5661d9;
            transform: translateY(-2px);
        }

        .btn-reset {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
            border: 1px solid var(--line);
        }

        .btn-reset:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .success-message {
            display: none;
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4caf50;
            color: #4caf50;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 600px) {
            .button-group {
                flex-direction: column;
            }

            .topbar {
                flex-direction: column;
                gap: 15px;
            }

            .title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="topbar">
            <h1 class="title">Créer votre CV</h1>
            <a class="back-link" href="index.html"><i class="fas fa-arrow-left"></i> Retour au portfolio</a>
        </div>

        <div class="panel">
            <div class="success-message" id="successMessage">
                ✓ Votre message a été envoyé avec succès !
            </div>

            <form id="cvForm">
                <h2>Vos informations</h2>

                <div class="field">
                    <label for="nameInput">Nom complet *</label>
                    <input id="nameInput" type="text" placeholder="John Doe" required>
                </div>

                <div class="field">
                    <label for="emailInput">Adresse email *</label>
                    <input id="emailInput" type="email" placeholder="john@example.com" required>
                </div>

                <div class="field">
                    <label for="phoneInput">Téléphone</label>
                    <input id="phoneInput" type="tel" placeholder="+33 6 12 34 56 78">
                </div>

                <div class="field">
                    <label for="roleInput">Poste recherché *</label>
                    <input id="roleInput" type="text" placeholder="Développeur Full Stack" required>
                </div>

                <div class="field">
                    <label for="aboutInput">Profil professionnel *</label>
                    <textarea id="aboutInput" placeholder="Décrivez votre profil..." required></textarea>
                </div>

                <div class="field">
                    <label for="skillsInput">Compétences *</label>
                    <textarea id="skillsInput" placeholder="Listez vos compétences (une par ligne)" required></textarea>
                </div>

                <div class="field">
                    <label for="expInput">Expérience professionnelle *</label>
                    <textarea id="expInput" placeholder="Décrivez votre expérience..." required></textarea>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-send">
                        <i class="fas fa-paper-plane"></i> Envoyer mon CV
                    </button>
                    <button type="reset" class="btn-reset">
                        <i class="fas fa-redo"></i> Réinitialiser
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('cvForm');
        const successMessage = document.getElementById('successMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                nom: document.getElementById('nameInput').value,
                email: document.getElementById('emailInput').value,
                telephone: document.getElementById('phoneInput').value,
                poste: document.getElementById('roleInput').value,
                profil: document.getElementById('aboutInput').value,
                competences: document.getElementById('skillsInput').value,
                experience: document.getElementById('expInput').value
            };

            try {
                // Envoyer les données à un serveur (à adapter selon votre backend)
                const response = await fetch('/api/cv', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                }).catch(() => {
                    // Si le serveur n'est pas disponible, afficher le message de succès
                    return { ok: true };
                });

                // Afficher le message de succès
                successMessage.classList.add('show');
                
                // Masquer le message après 5 secondes
                setTimeout(() => {
                    successMessage.classList.remove('show');
                }, 5000);

                // Réinitialiser le formulaire
                form.reset();

            } catch (error) {
                console.error('Erreur:', error);
                alert('Une erreur est survenue lors de l\'envoi.');
            }
        });
    </script>
</body>
</html>
