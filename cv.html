<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer votre CV | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #0b0d14;
            --card: #131728;
            --text: #f1f3ff;
            --muted: #9aa4c4;
            --accent: #6c72ff;
            --line: #2a3150;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at 20% 20%, #20284a, var(--bg));
            min-height: 100vh;
        }

        .wrap {
            max-width: 800px;
            margin: 0 auto;
            padding: 24px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            margin: 0;
        }

        .back-link {
            color: var(--text);
            text-decoration: none;
            border: 1px solid var(--line);
            padding: 10px 14px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .panel {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 30px;
        }

        h2 {
            margin-top: 0;
            font-size: 20px;
            margin-bottom: 20px;
            color: var(--accent);
        }

        .field {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--muted);
            font-size: 14px;
            font-weight: 500;
        }

        input,
        textarea {
            width: 100%;
            border: 1px solid var(--line);
            background: #0d1120;
            color: var(--text);
            border-radius: 10px;
            padding: 12px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        textarea {
            min-height: 100px;
            resize: vertical;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-send {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--accent);
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-send:hover {
            background: #5661d9;
            transform: translateY(-2px);
        }

        .btn-download {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(108, 114, 255, 0.2);
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .btn-download:hover {
            background: rgba(108, 114, 255, 0.3);
            transform: translateY(-2px);
        }

        .success-message {
            display: none;
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4caf50;
            color: #4caf50;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 600px) {
            .button-group {
                flex-direction: column;
            }

            .topbar {
                flex-direction: column;
                gap: 15px;
            }

            .title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="topbar">
            <h1 class="title">Créer votre CV</h1>
            <a class="back-link" href="index.html"><i class="fas fa-arrow-left"></i> Retour au portfolio</a>
        </div>

        <div class="panel">
            <div class="success-message" id="successMessage">
                ✓ Votre message a été envoyé avec succès !
            </div>

            <form id="cvForm">
                <h2>Vos informations</h2>

                <div class="field">
                    <label for="nameInput">Nom complet *</label>
                    <input id="nameInput" type="text" value="Mehdi Idrissi Kaitouni" readonly>
                </div>

                <div class="field">
                    <label for="emailInput">Adresse email *</label>
                    <input id="emailInput" type="email" value="mehdi.idrissi.kaitouni83@gmail.com" readonly>
                </div>

                <div class="field">
                    <label for="phoneInput">Téléphone</label>
                    <input id="phoneInput" type="tel" value="+212 6 56 00 19 96" readonly>
                </div>

                <div class="field">
                    <label for="roleInput">Poste recherché *</label>
                    <input id="roleInput" type="text" value="Developpeur Full Stack" readonly>
                </div>

                <div class="field">
                    <label for="aboutInput">Profil professionnel *</label>
                    <textarea id="aboutInput" readonly>Developpeur passionne par la creation de solutions web modernes, performantes et responsives. Avec plus de 3 ans d'experience dans le developpement web, je me specialise dans la creation d'applications modernes, reactives et performantes.</textarea>
                </div>

                <div class="field">
                    <label for="skillsInput">Compétences *</label>
                    <textarea id="skillsInput" readonly>HTML5 / CSS3
JavaScript
React.js
Vue.js
Node.js
Python / Django
PHP / Laravel
Git / GitHub
UI/UX Design
DevOps
React Native</textarea>
                </div>

                <div class="field">
                    <label for="expInput">Expérience professionnelle *</label>
                    <textarea id="expInput" readonly>3+ ans d'experience dans le developpement web et la creation d'interfaces modernes.

Experiences professionnelles:
- Plateforme E-commerce (React, Node.js, MongoDB)
- Dashboard analytique (Vue.js, Python)
- Applications web responsives et performantes</textarea>
                </div>

                <div class="button-group">
                    <a href="#contact" class="btn-send" id="contactLink">
                        <i class="fas fa-envelope"></i> Page de contact
                    </a>
                    <button type="button" class="btn-download" id="downloadBtn">
                        <i class="fas fa-download"></i> Télécharger mon CV
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Informations de Mehdi
        const mehdiInfo = {
            nom: "Mehdi Idrissi Kaitouni",
            email: "mehdi.idrissi.kaitouni83@gmail.com",
            telephone: "+212 6 56 00 19 96",
            localisation: "Fès, Maroc",
            profil: "Développeur passionné par la création de solutions web modernes, performantes et responsives. Avec plus de 3 ans d'expérience dans le développement web, je me spécialise dans la création d'applications modernes, réactives et performantes.",
            competences: "HTML5/CSS3, JavaScript, React.js, Vue.js, Node.js, Python, Django, PHP, Laravel, Git, UI/UX Design, DevOps, React Native",
            experience: "3+ ans d'experience dans le developpement web et la creation d'interfaces modernes.\n\nExpériences:\n- Plateforme E-commerce (React, Node.js, MongoDB)\n- Dashboard analytique\n- Applications web responsives"
        };

        const form = document.getElementById('cvForm');
        const successMessage = document.getElementById('successMessage');
        const downloadBtn = document.getElementById('downloadBtn');
        const contactLink = document.getElementById('contactLink');

        // Lien vers la page de contact
        contactLink.addEventListener('click', (e) => {
            e.preventDefault();
            document.location.href = "index.html#contact";
        });

        // Télécharger le CV en PDF
        downloadBtn.addEventListener('click', () => {
            const element = document.createElement('div');
            element.innerHTML = `
                <div style="font-family: Arial, sans-serif; padding: 20px; max-width: 800px;">
                    <h1 style="color: #000000; margin-bottom: 5px;">${mehdiInfo.nom}</h1>
                    <p style="color: #000000; margin: 0 0 20px 0;">Développeur Full Stack</p>
                    
                    <div style="border-bottom: 2px solid #000000; padding-bottom: 15px; margin-bottom: 20px;">
                        <p style="margin: 5px 0; color: #000000;"><strong>📧 Email:</strong> ${mehdiInfo.email}</p>
                        <p style="margin: 5px 0; color: #000000;"><strong>📱 Téléphone:</strong> ${mehdiInfo.telephone}</p>
                        <p style="margin: 5px 0; color: #000000;"><strong>📍 Localisation:</strong> ${mehdiInfo.localisation}</p>
                    </div>
                    
                    <h2 style="color: #000000; font-size: 18px; margin-bottom: 10px;">Profil professionnel</h2>
                    <p style="line-height: 1.6; margin-bottom: 20px; color: #000000;">${mehdiInfo.profil}</p>
                    
                    <h2 style="color: #000000; font-size: 18px; margin-bottom: 10px;">Compétences</h2>
                    <p style="line-height: 1.6; margin-bottom: 20px; color: #000000;">${mehdiInfo.competences}</p>
                    
                    <h2 style="color: #000000; font-size: 18px; margin-bottom: 10px;">Expérience</h2>
                    <p style="line-height: 1.6; white-space: pre-wrap; color: #000000;">${mehdiInfo.experience}</p>
                </div>
            `;

            const options = {
                margin: 10,
                filename: 'CV_Mehdi_Idrissi_Kaitouni.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
            };

            html2pdf().set(options).from(element).save();
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                nom: document.getElementById('nameInput').value,
                email: document.getElementById('emailInput').value,
                telephone: document.getElementById('phoneInput').value,
                poste: document.getElementById('roleInput').value,
                profil: document.getElementById('aboutInput').value,
                competences: document.getElementById('skillsInput').value,
                experience: document.getElementById('expInput').value
            };

            try {
                // Envoyer les données à un serveur (à adapter selon votre backend)
                const response = await fetch('/api/cv', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                }).catch(() => {
                    // Si le serveur n'est pas disponible, afficher le message de succès
                    return { ok: true };
                });

                // Afficher le message de succès
                successMessage.classList.add('show');
                
                // Masquer le message après 5 secondes
                setTimeout(() => {
                    successMessage.classList.remove('show');
                }, 5000);

                // Réinitialiser le formulaire
                form.reset();

            } catch (error) {
                console.error('Erreur:', error);
                alert('Une erreur est survenue lors de l\'envoi.');
            }
        });
    </script>
</body>
</html>
